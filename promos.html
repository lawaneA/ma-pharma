<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Promos du mois</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #d2d2d2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 64px;
    }

    /* ══ HEADER ══ */
    .page-header {
      width: 100%; max-width: 480px;
      display: flex; align-items: center;
      gap: 12px;
      padding: 20px 16px 16px;
    }
    .btn-back {
      width: 40px; height: 40px; border-radius: 12px;
      background: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.15s;
      text-decoration: none; color: #111;
    }
    .btn-back:hover { background: #f0f0f0; }
    .header-title {
      font-size: 20px; font-weight: 800; color: #111;
    }
    .header-sub {
      font-size: 13px; color: #666; font-weight: 400; margin-top: 1px;
    }

    /* ══ GRILLE PRODUITS ══ */
    .promo-grid {
      width: 100%; max-width: 480px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px;
    }

    /* ══ CARD PRODUIT ══ */
    .product-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .product-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #f5f5f5;
      overflow: hidden;
    }
    .product-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .product-badge {
      position: absolute; top: 8px; left: 8px;
      background: #0012ff; color: #fff;
      font-size: 10px; font-weight: 800;
      padding: 3px 8px; border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .product-info {
      padding: 10px 12px 14px;
      display: flex; flex-direction: column; gap: 6px; flex: 1;
    }
    .product-name {
      font-size: 13px; font-weight: 700; color: #111;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-prices {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .price-after {
      font-size: 16px; font-weight: 800; color: #0012ff;
    }
    .price-before {
      font-size: 12px; color: #aaa; text-decoration: line-through; font-weight: 500;
    }
    .discount-pct {
      font-size: 11px; font-weight: 700; color: #fff;
      background: #e03030; border-radius: 6px;
      padding: 1px 6px; margin-left: auto;
    }

    /* ══ ÉTAT VIDE ══ */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 16px;
      color: #888;
    }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* ══ LOADER ══ */
    .loader-section { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; margin-top:48px; width:100%; }
    .loader-label { font-size:12px; font-weight:500; color:rgba(0,18,255,0.45); letter-spacing:0.5px; }
    .loader { --size:110px; --dur:4s; height:var(--size); aspect-ratio:1; position:relative; }
    .loader .box { position:absolute; background:linear-gradient(0deg,rgba(0,18,255,0.06) 0%,rgba(0,18,255,0.14) 100%); border-radius:50%; border-top:1px solid rgba(0,18,255,0.4); animation:ripple var(--dur) infinite ease-in-out; }
    .loader .box:nth-child(1){inset:40%;z-index:99;}
    .loader .box:nth-child(2){inset:30%;z-index:98;border-color:rgba(0,18,255,0.28);animation-delay:0.4s;}
    .loader .box:nth-child(3){inset:20%;z-index:97;border-color:rgba(0,18,255,0.18);animation-delay:0.8s;}
    .loader .box:nth-child(4){inset:10%;z-index:96;border-color:rgba(0,18,255,0.10);animation-delay:1.2s;}
    .loader .box:nth-child(5){inset:0%;z-index:95;border-color:rgba(0,18,255,0.05);animation-delay:1.6s;}
    .loader .logo { position:absolute; inset:0; display:grid; place-content:center; padding:28%; z-index:100; }
    .loader .logo img { width:100%; animation:logo-pulse var(--dur) infinite ease-in-out; }
    @keyframes ripple    { 0%,100%{transform:scale(1);}50%{transform:scale(1.3);} }
    @keyframes logo-pulse{ 0%,100%{opacity:0.45;}50%{opacity:1;} }
  </style>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <div class="page-header">
    <a class="btn-back" href="index.html">←</a>
    <div>
      <div class="header-title">Promos du mois 🏷️</div>
      <div class="header-sub" id="pharmacie-name">Pharmacie NHEAN</div>
    </div>
  </div>

  <!-- ══ GRILLE ══ -->
  <div class="promo-grid" id="promo-grid">
    <!-- Rempli par JS -->
  </div>

  <!-- ══ LOADER ══ -->
  <div class="loader-section">
    <div class="loader">
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="logo"><img src="Logo-test-swiftlink.png" alt="Swift'Link"></div>
    </div>
    <span class="loader-label">Propulsé par Swift'Link</span>
  </div>

  <script>
  function calcDiscount(avant, apres) {
    if (!avant || !apres || avant <= apres) return null;
    return '-' + Math.round((1 - apres / avant) * 100) + '%';
  }

  function renderPromos() {
    const grid = document.getElementById('promo-grid');
    let promos = [];
    try {
      const raw = localStorage.getItem('swiftlink_config');
      if (raw) {
        const cfg = JSON.parse(raw);
        if (cfg.pharmacie && cfg.pharmacie.nom) {
          document.getElementById('pharmacie-name').textContent = cfg.pharmacie.nom;
        }
        promos = (cfg.promos || []).filter(p => p.actif && p.nom);
      }
    } catch(e) { console.warn('Config invalide', e); }

    if (promos.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🏷️</div>
          <p>Aucune promotion disponible<br>pour le moment.<br><br>Revenez bientôt !</p>
        </div>`;
      return;
    }

    grid.innerHTML = promos.map(p => {
      const discount = calcDiscount(parseFloat(p.prix_avant), parseFloat(p.prix_apres));
      const imgSrc   = p.image || 'placeholder-product.png';
      const badge    = p.badge ? `<div class="product-badge">${p.badge}</div>` : '';
      const prixAvant= p.prix_avant ? `<span class="price-before">${parseFloat(p.prix_avant).toFixed(2)} €</span>` : '';
      const prixApres= p.prix_apres ? `<span class="price-after">${parseFloat(p.prix_apres).toFixed(2)} €</span>` : '';
      const pct      = discount    ? `<span class="discount-pct">${discount}</span>` : '';

      return `
        <div class="product-card">
          <div class="product-img-wrap">
            <img src="${imgSrc}" alt="${p.nom}" onerror="this.src='placeholder-product.png'">
            ${badge}
          </div>
          <div class="product-info">
            <div class="product-name">${p.nom}</div>
            <div class="product-prices">
              ${prixApres}
              ${prixAvant}
              ${pct}
            </div>
          </div>
        </div>`;
    }).join('');
  }

  renderPromos();
  </script>

</body>
</html>
